env:
  contexts:
    - name: JuiceShop
      urls:
        - http://127.0.0.1:3000
      authentication:
        method: manual

  parameters:
    failOnError: false
    failOnWarning: false

jobs:

  - type: spider
    parameters:
      context: JuiceShop
      maxDuration: 25

  - type: spiderAjax
    parameters:
      context: JuiceShop
      maxDuration: 40

  - type: passiveScan-wait
    parameters:
      maxDuration: 20

  - type: activeScan
    parameters:
      context: JuiceShop
      maxRuleDurationInMins: 8
      maxScanDurationInMins: 120

  - type: report
    parameters:
      template: traditional-html
      reportDir: /zap/reports
      reportFile: zap-report.html

  - type: report
    parameters:
      template: traditional-json
      reportDir: /zap/reports
      reportFile: zap-report.json
