name: Scan OWASP Juice Shop with ZAP and Playwright

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  dast:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ZAP_PROXY: http://127.0.0.1:8080

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start Juice Shop from Docker
        run: |
          docker run -d \
            --name juice-shop \
            --network=host \
            -e NODE_ENV=production \
            bkimminich/juice-shop:latest

      - name: Wait for Juice Shop
        run: |
          echo "Waiting for Juice Shop to start..."
          sleep 15
          for i in {1..60}; do
            echo "Attempt $i/60: Checking Juice Shop..."
            if curl -fsS http://127.0.0.1:3000/ >/dev/null 2>&1; then
              echo "✓ Juice Shop is ready"
              exit 0
            fi
            sleep 5
          done
          
          echo "✗ Juice Shop failed to start"
          echo "=== Juice Shop logs ==="
          docker logs juice-shop || true
          exit 1

      - name: Start OWASP ZAP
        run: |
          docker run -d \
            --name zap \
            --network=host \
            -u zap \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -daemon \
            -host 0.0.0.0 \
            -port 8080 \
            -config api.disablekey=true \
            -config api.addrs.addr.name=.* \
            -config api.addrs.addr.regex=true

      - name: Check ZAP container started
        run: |
          sleep 10
          echo "=== Container Status ==="
          docker ps | grep zap || (echo "ERROR: ZAP container not found"; docker ps; exit 1)
          echo ""
          echo "=== ZAP Logs (first 100 lines) ==="
          docker logs zap 2>&1 | head -100 || true
          echo ""
          echo "=== Network inspection ==="
          docker inspect zap | grep -A 5 '"Ports"' || true

      - name: Wait for ZAP API
        run: |
          echo "Attempting to connect to ZAP API..."
          for i in {1..60}; do
            echo "Attempt $i/60..."
            
            if response=$(curl -v $ZAP_PROXY/JSON/core/view/version/ 2>&1); then
              echo "curl succeeded"
              if echo "$response" | grep -q '"version"'; then
                echo "ZAP API is ready"
                exit 0
              fi
              echo "Response: $response" | head -10
            else
              echo "curl failed with exit code $?"
            fi
            
            sleep 3
          done

          echo "ZAP API did not become ready in time"
          echo ""
          echo "=== Final diagnostics ==="
          docker ps || true
          docker logs zap || true
          curl -v $ZAP_PROXY/ 2>&1 || true
          exit 1

      - name: Run Playwright via ZAP proxy
        run: |
          set -euo pipefail

          echo "Running Playwright tests one scenario at a time..."

          RESULT=0
          FAILED_SPECS=()
          mkdir -p playwright-logs
          shopt -s nullglob
          TEST_SPECS=(./tests/juice-shop-*.spec.ts)

          for spec in "${TEST_SPECS[@]}"; do
            scenario=$(basename "$spec")
            log_file="playwright-logs/${scenario}.log"
            echo "=== Running ${scenario} ==="

            if npx playwright test "$spec" --project=chromium --timeout=300000 --reporter=html --reporter=line 2>&1 | tee "$log_file"; then
              echo "PASSED SCENARIO: ${scenario}"
            else
              echo "FAILED SCENARIO: ${scenario}" >&2
              FAILED_SPECS+=("${scenario}")
              RESULT=1
            fi
          done

          if ((${#FAILED_SPECS[@]} > 0)); then
            echo "=== Failed scenarios ===" >&2
            printf ' - %s\n' "${FAILED_SPECS[@]}" >&2
          fi

          echo "Checking for playwright-report directory..."
          ls -la playwright-report/ || echo "Warning: playwright-report not found"

          echo "Verifying Juice Shop is still running..."
          curl -fsS http://127.0.0.1:3000/ > /dev/null && echo "✓ Juice Shop is accessible" || echo "✗ Juice Shop is not accessible"

          exit $RESULT
      - name: Generate ZAP report with Automation Framework
        run: |
          set -euo pipefail

          mkdir -p reports

          docker cp zap/automation.yaml zap:/tmp/automation.yaml
          docker exec zap mkdir -p /zap/reports

          # 起動中の ZAP デーモンの API 経由で自動化プランを実行する。
          # --network=host によりコンテナ内の localhost はホストの localhost と同一。
          echo "Starting ZAP Automation Framework..."
          response=$(curl -s "$ZAP_PROXY/JSON/automation/action/runPlan/?filePath=/tmp/automation.yaml")
          echo "API Response: $response"
          planId=$(echo "$response" | grep -o '"planId":"[^"]*"' | cut -d'"' -f4 || echo "")
          echo "Plan ID: $planId"

          # planId が取得できない場合は即失敗。
          if [ -z "$planId" ]; then
            echo "ERROR: Failed to start automation plan (planId is empty)."
            docker logs zap | tail -200 || true
            exit 1
          fi

          # レポート生成完了をポーリングで待機（最大 90 分）。
          # planId は 0 も有効値になりうるため不正扱いしない。
          echo "Waiting for ZAP reports to be generated..."
          generated=false
          for i in {1..540}; do
            if docker exec zap sh -c 'test -s /zap/reports/zap-report.html && test -s /zap/reports/zap-report.json'; then
              echo "Reports are present in container."
              generated=true
              break
            fi

            progress=$(curl -s "$ZAP_PROXY/JSON/automation/view/planProgress/?planId=$planId" || true)
            echo "Plan Progress $i/540: ${progress:-<empty>}"

            # 明確な失敗状態が返ってきた場合は待機を打ち切る。
            if echo "$progress" | grep -Eiq '"(status|state|phase)":"(failed|error|aborted|stopped)"'; then
              echo "ERROR: Automation plan entered a failure state."
              docker logs zap | tail -300 || true
              exit 1
            fi
            sleep 10
          done

          if [ "$generated" != "true" ]; then
            echo "ERROR: ZAP reports were not generated within timeout."
            echo "=== ZAP logs (last 300 lines) ==="
            docker logs zap | tail -300 || true
            exit 1
          fi
          
          echo "Final ZAP Container Logs:"
          docker logs zap | tail -100
          
          # コンテナからレポートをコピー
          echo "Copying reports from ZAP container..."
          docker cp zap:/zap/reports/. reports || echo "Warning: Could not copy reports"
          
          # レポートが実際に生成されたか確認
          echo "Checking generated reports:"
          ls -la reports/
          find reports -type f \( -name "*.html" -o -name "*.json" \)

          if [ ! -s reports/zap-report.html ] || [ ! -s reports/zap-report.json ]; then
            echo "ERROR: Required ZAP reports are missing or empty."
            echo "Expected files: reports/zap-report.html and reports/zap-report.json"
            exit 1
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results

      - name: Upload Playwright logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-logs
          path: playwright-logs

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zap-report
          path: reports
          if-no-files-found: error

      - name: Create GitHub issue on Medium/High ZAP risks
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('node:fs')

            try {
              if (!fs.existsSync('reports/zap-report.json')) {
                core.warning('reports/zap-report.json not found. Skipping issue creation.')
                return
              }

              const report = JSON.parse(fs.readFileSync('reports/zap-report.json', 'utf8'))
              const alerts = (report.site || []).flatMap((s) => s.alerts || [])

              const isMedium = (a) => {
                const code = String(a.riskcode ?? '').trim()
                const desc = String(a.riskdesc ?? '').toLowerCase()
                return code === '2' || /medium/.test(desc)
              }

              const isHigh = (a) => {
                const code = String(a.riskcode ?? '').trim()
                const desc = String(a.riskdesc ?? '').toLowerCase()
                return code === '3' || /high/.test(desc)
              }

              const mediumAlerts = alerts.filter(isMedium)
              const highAlerts = alerts.filter(isHigh)
              const findings = [...highAlerts, ...mediumAlerts]
              core.info(`ZAP risk summary: High=${highAlerts.length}, Medium=${mediumAlerts.length}`)

              if (findings.length === 0) {
                core.info('No Medium/High risk findings detected. No issue will be created.')
                return
              }

              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              let createdCount = 0

              const normalize = (value) => String(value || '').trim()
              const truncate = (value, max = 200) => (value.length > max ? `${value.slice(0, max - 3)}...` : value)

              const getLocationInstances = (finding) => {
                const instances = Array.isArray(finding.instances) ? finding.instances : []
                if (instances.length === 0) {
                  return [
                    {
                      uri: 'n/a',
                      method: 'METHOD',
                      param: '',
                      attack: '',
                      evidence: '',
                      otherinfo: normalize(finding.otherinfo)
                    }
                  ]
                }

                const seen = new Set()
                const uniqueInstances = []

                for (const instance of instances) {
                  const uri = normalize(instance.uri) || 'n/a'
                  const method = normalize(instance.method) || 'METHOD'
                  const param = normalize(instance.param)
                  const key = `${uri}|${method}|${param}`

                  if (seen.has(key)) {
                    continue
                  }

                  seen.add(key)
                  uniqueInstances.push({
                    uri,
                    method,
                    param,
                    attack: normalize(instance.attack),
                    evidence: normalize(instance.evidence),
                    otherinfo: normalize(instance.otherinfo)
                  })
                }

                return uniqueInstances
              }

              for (const finding of findings) {
                const risk = String(finding.riskdesc || finding.riskcode || 'n/a').trim()
                const alertName = String(finding.alert || 'Unknown alert').trim()
                const pluginId = String(finding.pluginid || 'unknown').trim()
                const cweId = String(finding.cweid || 'n/a').trim()
                const wascId = String(finding.wascid || 'n/a').trim()
                const description = String(finding.desc || '').trim()
                const solution = String(finding.solution || '').trim()
                const reference = String(finding.reference || '').trim()

                const locations = getLocationInstances(finding)

                for (const location of locations) {
                  const locationText = `${location.uri} [${location.method}]${location.param ? ` (param: ${location.param})` : ''}`
                  const title = truncate(`[ZAP][${risk}] ${alertName} @ ${location.method} ${location.uri}`)
                  const body = [
                    'ZAP scan detected a Medium/High risk vulnerability.',
                    '',
                    `- Risk: ${risk}`,
                    `- Alert: ${alertName}`,
                    `- Plugin ID: ${pluginId}`,
                    `- CWE: ${cweId}`,
                    `- WASC: ${wascId}`,
                    `- Workflow run: ${runUrl}`,
                    '',
                    'Affected location:',
                    `- ${locationText}`,
                    '',
                    'Description:',
                    description || 'n/a',
                    '',
                    'Solution:',
                    solution || 'n/a',
                    '',
                    'Reference:',
                    reference || 'n/a',
                    '',
                    'Instance details:',
                    `- Attack: ${location.attack || 'n/a'}`,
                    `- Evidence: ${location.evidence || 'n/a'}`,
                    `- Other Info: ${location.otherinfo || 'n/a'}`,
                    '',
                    '_This issue was created automatically by GitHub Actions._'
                  ].join('\n')

                  const created = await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title,
                    body
                  })

                  createdCount += 1
                  core.info(`Created issue: ${created.data.html_url}`)
                }
              }

              core.info(`Created ${createdCount} issue(s) for Medium/High findings.`)
            } catch (error) {
              core.warning(`Could not create issue: ${error.message}`)
            }

      - name: Upload runtime logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: runtime-logs
          path: |
            juice-shop.log

      - name: Show container logs
        if: always()
        run: |
          docker logs zap || true
          tail -n 200 juice-shop.log || true

      - name: Cleanup
        if: always()
        run: |
          docker rm -f juice-shop zap || true