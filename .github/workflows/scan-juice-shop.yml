name: Scan OWASP Juice Shop with ZAP and Playwright

on:
  workflow_dispatch:

# セルフホストマシンに ZAP および Playwright をインストールし、
# OWASP Juice Shop に対して DAST を行うワークフローです。

jobs:
  dast:
    runs-on: self-hosted
    timeout-minutes: 90
    env:
      ZAP_PROXY: http://127.0.0.1:8080

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify Node and npm on runner
        shell: powershell
        run: |
          Write-Host '=== Node/npm diagnostics ==='
          Write-Host "PATH: $env:PATH"

          $nodeCmd = Get-Command node -ErrorAction SilentlyContinue
          $npmCmd = Get-Command npm -ErrorAction SilentlyContinue
          $npmCmdCmd = Get-Command npm.cmd -ErrorAction SilentlyContinue

          if ($nodeCmd) { Write-Host "node command: $($nodeCmd.Source)" }
          if ($npmCmd) { Write-Host "npm command: $($npmCmd.Source)" }
          if ($npmCmdCmd) { Write-Host "npm.cmd command: $($npmCmdCmd.Source)" }

          where.exe node
          where.exe npm

          node -v
          npm -v

      - name: Install root dependencies
        run: npm.cmd install

      - name: Install Playwright browsers
        run: npx.cmd playwright install --with-deps

      - name: Stop stale listeners on 8080
        shell: powershell
        run: |
          Write-Host '=== Stop stale listeners on port 8080 ==='

          $listenerLines = netstat -ano | Select-String ':8080\s+.*LISTENING\s+(\d+)$'
          if (-not $listenerLines) {
            Write-Host 'No listener found on port 8080.'
            exit 0
          }

          foreach ($line in $listenerLines) {
            $match = [regex]::Match($line.Line, '(\d+)$')
            if ($match.Success) {
              $portOwnerProcessId = $match.Groups[1].Value
              Write-Host "Stopping process on port 8080: PID $portOwnerProcessId"
              Stop-Process -Id $portOwnerProcessId -Force -ErrorAction SilentlyContinue
            }
          }

          Start-Sleep -Seconds 2
          $remaining = netstat -ano | Select-String ':8080\s+.*LISTENING\s+(\d+)$'
          if ($remaining) {
            Write-Error 'Port 8080 is still in use after cleanup attempt.'
            $remaining | ForEach-Object { $_.Line }
            exit 1
          }

      - name: Start OWASP ZAP
        shell: powershell
        run: |
          $zapCommand = $null

          $zapFromPath = Get-Command zap.bat -ErrorAction SilentlyContinue
          if ($zapFromPath) {
            $zapCommand = $zapFromPath.Source
          }

          if (-not $zapCommand) {
            $candidatePaths = @(
              'C:\Program Files\ZAP\Zed Attack Proxy\zap.bat',
              'C:\Program Files (x86)\ZAP\Zed Attack Proxy\zap.bat'
            )
            foreach ($candidate in $candidatePaths) {
              if (Test-Path $candidate) {
                $zapCommand = $candidate
                break
              }
            }
          }

          if (-not $zapCommand) {
            Write-Error 'Could not find installed OWASP ZAP (zap.bat). Add it to PATH or install it in the default location.'
            exit 1
          }

          $process = Start-Process -FilePath $zapCommand -ArgumentList @(
            '-daemon',
            '-host', '0.0.0.0',
            '-port', '8080',
            '-config', 'api.disablekey=true',
            '-config', 'api.addrs.addr.name=.*',
            '-config', 'api.addrs.addr.regex=true'
          ) -RedirectStandardOutput '.\zap.log' -RedirectStandardError '.\zap-error.log' -PassThru

          Set-Content -Path '.\zap-launcher.pid' -Value $process.Id
          Set-Content -Path '.\zap.pid' -Value $process.Id
          Write-Host "Started ZAP launcher process ID: $($process.Id)"

      - name: Check ZAP process started
        shell: powershell
        run: |
          Start-Sleep -Seconds 10
          Write-Host '=== ZAP Process Check ==='

          $launcherProcessId = $null
          if (Test-Path '.\zap-launcher.pid') {
            $launcherProcessId = Get-Content '.\zap-launcher.pid' -ErrorAction SilentlyContinue
          }

          $launcherAlive = $false
          if ($launcherProcessId) {
            $launcherAlive = $null -ne (Get-Process -Id $launcherProcessId -ErrorAction SilentlyContinue)
            Write-Host "Launcher PID: $launcherProcessId (alive=$launcherAlive)"
          }

          Write-Host ''
          Write-Host '=== Port 8080 Check ==='
          $portLines = netstat -ano | Select-String ':8080\s+.*(LISTENING|ESTABLISHED)\s+(\d+)$'
          $portLines | ForEach-Object { $_.Line }

          $listenerPid = $null
          foreach ($line in $portLines) {
            $match = [regex]::Match($line.Line, '(\d+)$')
            if ($match.Success) {
              $listenerPid = $match.Groups[1].Value
              break
            }
          }

          if ($listenerPid) {
            Set-Content -Path '.\zap.pid' -Value $listenerPid
            Write-Host "Detected ZAP listener process ID: $listenerPid"
            exit 0
          }

          if (-not $launcherAlive) {
            Write-Error 'ZAP launcher has exited and no listener was found on port 8080.'
            if (Test-Path '.\zap.log') { Get-Content '.\zap.log' -Tail 100 }
            if (Test-Path '.\zap-error.log') { Get-Content '.\zap-error.log' -Tail 100 }
            exit 1
          }

          Write-Host 'Launcher is alive; continuing to API readiness check.'

      - name: Wait for ZAP API
        shell: powershell
        run: |
          Write-Host 'Attempting to connect to ZAP API...'
          Write-Host 'Timeout window: 180 attempts x 5 seconds (max 900 seconds)'

          for ($i = 1; $i -le 180; $i++) {
            Write-Host "Attempt $i/180..."

            try {
              $response = Invoke-RestMethod -Uri "$env:ZAP_PROXY/JSON/core/view/version/" -TimeoutSec 5 -ErrorAction Stop
              if ($response.version) {
                $listenerLine = netstat -ano | Select-String ':8080\s+.*LISTENING\s+(\d+)$' | Select-Object -First 1
                if ($listenerLine) {
                  $match = [regex]::Match($listenerLine.Line, '(\d+)$')
                  if ($match.Success) {
                    Set-Content -Path '.\zap.pid' -Value $match.Groups[1].Value
                    Write-Host "Recorded ZAP listener process ID: $($match.Groups[1].Value)"
                  }
                }
                Write-Host "ZAP API is ready. Version: $($response.version)"
                exit 0
              }
            } catch {
              $message = $_.Exception.Message
              $statusCode = $null

              if ($_.Exception.PSObject.Properties['Response'] -and $_.Exception.Response -and $_.Exception.Response.StatusCode) {
                $statusCode = [int]$_.Exception.Response.StatusCode
              }

              if ($statusCode) {
                Write-Host "Attempt $i failed with HTTP status $statusCode: $message"
              } else {
                Write-Host "Attempt $i failed: $message"
              }

              if (($i % 15) -eq 0) {
                Write-Host 'Current port 8080 state:'
                $portState = netstat -ano | Select-String ':8080'
                if ($portState) {
                  $portState | ForEach-Object { $_.Line }
                } else {
                  Write-Host 'No socket activity on port 8080.'
                }
              }
            }

            Start-Sleep -Seconds 5
          }

          Write-Error 'ZAP API did not become ready in time.'
          if (Test-Path '.\zap.log') { Get-Content '.\zap.log' -Tail 200 }
          if (Test-Path '.\zap-error.log') { Get-Content '.\zap-error.log' -Tail 200 }
          exit 1

      - name: Run Playwright via ZAP proxy
        shell: powershell
        run: |
          Write-Host 'Running Playwright tests...'
          npx.cmd playwright test ./tests/ --project=chromium --timeout=120000 --reporter=html --reporter=line
          Write-Host "Playwright tests completed with exit code: $LASTEXITCODE"

          Write-Host 'Checking for playwright-report directory...'
          if (Test-Path '.\playwright-report') {
            Get-ChildItem '.\playwright-report' -Force
          } else {
            Write-Warning 'playwright-report not found'
          }

          Write-Host 'Verifying Juice Shop is still running...'
          try {
            $null = Invoke-WebRequest -Uri 'http://127.0.0.1:3000/' -UseBasicParsing -TimeoutSec 10 -ErrorAction Stop
            Write-Host 'Juice Shop is accessible'
          } catch {
            Write-Warning 'Juice Shop is not accessible'
          }

      - name: Generate ZAP report with Automation Framework
        shell: powershell
        run: |
          $reportsDir = Join-Path $PWD 'reports'
          New-Item -ItemType Directory -Path $reportsDir -Force | Out-Null

          $automationTemplate = Join-Path $PWD 'zap\automation.yaml'
          if (-not (Test-Path $automationTemplate)) {
            Write-Error "Automation plan file not found: $automationTemplate"
            exit 1
          }

          $hostReportDir = $reportsDir -replace '\\', '/'
          $automationRunFile = Join-Path $env:RUNNER_TEMP 'automation-host.yaml'

          $automationYaml = Get-Content -Path $automationTemplate -Raw
          $automationYaml = $automationYaml -replace 'reportDir:\s*/zap/reports', "reportDir: '$hostReportDir'"
          Set-Content -Path $automationRunFile -Value $automationYaml

          Write-Host "Starting ZAP Automation Framework with plan: $automationRunFile"
          $planPathForApi = [uri]::EscapeDataString(($automationRunFile -replace '\\', '/'))
          $response = Invoke-RestMethod -Uri "$env:ZAP_PROXY/JSON/automation/action/runPlan/?filePath=$planPathForApi" -ErrorAction Stop
          $responseJson = $response | ConvertTo-Json -Depth 10 -Compress
          Write-Host "API Response: $responseJson"

          $planId = "$($response.planId)"
          Write-Host "Plan ID: $planId"
          if ([string]::IsNullOrWhiteSpace($planId)) {
            Write-Error 'Failed to start automation plan (planId is empty).'
            if (Test-Path '.\zap.log') { Get-Content '.\zap.log' -Tail 300 }
            if (Test-Path '.\zap-error.log') { Get-Content '.\zap-error.log' -Tail 300 }
            exit 1
          }

          Write-Host 'Waiting for ZAP reports to be generated...'
          $generated = $false
          for ($i = 1; $i -le 270; $i++) {
            $htmlReport = Join-Path $reportsDir 'zap-report.html'
            $jsonReport = Join-Path $reportsDir 'zap-report.json'

            if ((Test-Path $htmlReport) -and (Test-Path $jsonReport) -and ((Get-Item $htmlReport).Length -gt 0) -and ((Get-Item $jsonReport).Length -gt 0)) {
              Write-Host 'Reports are present on host filesystem.'
              $generated = $true
              break
            }

            try {
              $progress = Invoke-RestMethod -Uri "$env:ZAP_PROXY/JSON/automation/view/planProgress/?planId=$planId" -ErrorAction Stop
              $progressJson = $progress | ConvertTo-Json -Depth 10 -Compress
            } catch {
              $progressJson = '<empty>'
            }
            Write-Host "Plan Progress $i/270: $progressJson"

            if ($progressJson -match '"(status|state|phase)":"(failed|error|aborted|stopped)"') {
              Write-Error 'Automation plan entered a failure state.'
              if (Test-Path '.\zap.log') { Get-Content '.\zap.log' -Tail 300 }
              if (Test-Path '.\zap-error.log') { Get-Content '.\zap-error.log' -Tail 300 }
              exit 1
            }

            Start-Sleep -Seconds 10
          }

          if (-not $generated) {
            Write-Error 'ZAP reports were not generated within timeout.'
            if (Test-Path '.\zap.log') { Get-Content '.\zap.log' -Tail 300 }
            if (Test-Path '.\zap-error.log') { Get-Content '.\zap-error.log' -Tail 300 }
            exit 1
          }

          Write-Host 'Checking generated reports:'
          Get-ChildItem -Path $reportsDir -File

          $requiredReports = @(
            (Join-Path $reportsDir 'zap-report.html'),
            (Join-Path $reportsDir 'zap-report.json')
          )
          foreach ($file in $requiredReports) {
            if (-not (Test-Path $file) -or (Get-Item $file).Length -eq 0) {
              Write-Error "Required ZAP report is missing or empty: $file"
              exit 1
            }
          }

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: reports
          if-no-files-found: error

      - name: Upload runtime logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-logs
          path: |
            juice-shop.log
            zap.log
            zap-error.log

      - name: Show runtime logs
        if: always()
        shell: powershell
        run: |
          if (Test-Path '.\juice-shop.log') { Get-Content '.\juice-shop.log' -Tail 200 }
          if (Test-Path '.\zap.log') { Get-Content '.\zap.log' -Tail 200 }
          if (Test-Path '.\zap-error.log') { Get-Content '.\zap-error.log' -Tail 200 }

      - name: Cleanup
        if: always()
        shell: powershell
        run: |
          if (Test-Path '.\juice-shop.pid') {
            $juiceShopPid = Get-Content '.\juice-shop.pid' -ErrorAction SilentlyContinue
            if ($juiceShopPid) {
              Stop-Process -Id $juiceShopPid -Force -ErrorAction SilentlyContinue
            }
          }

          if (Test-Path '.\zap.pid') {
            $zapProcessId = Get-Content '.\zap.pid' -ErrorAction SilentlyContinue
            if ($zapProcessId) {
              Stop-Process -Id $zapProcessId -Force -ErrorAction SilentlyContinue
            }
          }

          if (Test-Path '.\zap-launcher.pid') {
            $zapLauncherProcessId = Get-Content '.\zap-launcher.pid' -ErrorAction SilentlyContinue
            if ($zapLauncherProcessId) {
              Stop-Process -Id $zapLauncherProcessId -Force -ErrorAction SilentlyContinue
            }
          }