name: ZAP Scan on VM

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  zapscan:
    name: Deploy on VM and run ZAP baseline
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: juice-shop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'latest'

      - name: Install dependencies
        run: |
          npm install

      - name: Start Juice Shop
        run: |
          npm start > juice-shop.log 2>&1 &
          echo $! > juice-shop.pid

      - name: Wait for application to be ready
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/ >/dev/null; then
              echo "Juice Shop is up"
              exit 0
            fi
            sleep 5
          done
          echo "Application did not become ready in time"
          tail -n 200 juice-shop.log || true
          exit 1

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://127.0.0.1:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j'

      - name: Upload Juice Shop log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: juice-shop-log
          path: juice-shop/juice-shop.log

      - name: Stop Juice Shop
        if: always()
        run: |
          if [ -f juice-shop.pid ]; then
            kill "$(cat juice-shop.pid)" || true
          fi