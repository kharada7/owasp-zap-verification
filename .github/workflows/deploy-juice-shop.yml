name: Deploy OWASP Juice Shop

on:
  workflow_dispatch:

# セルフホストマシンに OWASP Juice Shop をデプロイするワークフローです。
jobs:
  deploy-juice-shop:
    name: Deploy Juice Shop (self-hosted)
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root dependencies
        run: npm install

      - name: Install Juice Shop dependencies
        working-directory: ./juice-shop
        run: npm install

      - name: Stop stale Juice Shop process
        shell: powershell
        run: |
          if (Test-Path ".\juice-shop.pid") {
            $oldPid = Get-Content ".\juice-shop.pid" -ErrorAction SilentlyContinue
            if ($oldPid) {
              Stop-Process -Id $oldPid -Force -ErrorAction SilentlyContinue
            }
            Remove-Item ".\juice-shop.pid" -ErrorAction SilentlyContinue
          }

          $netstatLines = netstat -ano | Select-String ":3000\s+.*LISTENING\s+(\d+)$"
          foreach ($line in $netstatLines) {
            $portOwnerProcessId = [int]$line.Matches[0].Groups[1].Value
            Stop-Process -Id $portOwnerProcessId -Force -ErrorAction SilentlyContinue
          }

      - name: Start Juice Shop from repository
        working-directory: ./juice-shop
        shell: powershell
        run: |
          $process = Start-Process -FilePath "npm.cmd" -ArgumentList "start" -WorkingDirectory (Get-Location) -RedirectStandardOutput "..\juice-shop.log" -RedirectStandardError "..\juice-shop-error.log" -PassThru
          Set-Content -Path "..\juice-shop.pid" -Value $process.Id

          Start-Sleep -Seconds 3
          if ($null -eq (Get-Process -Id $process.Id -ErrorAction SilentlyContinue)) {
            Write-Error "Juice Shop process exited immediately after startup."
            if (Test-Path "..\juice-shop.log") {
              Get-Content "..\juice-shop.log" -Tail 50
            }
            if (Test-Path "..\juice-shop-error.log") {
              Get-Content "..\juice-shop-error.log" -Tail 50
            }
            exit 1
          }

      - name: Wait for Juice Shop
        shell: powershell
        run: |
          $urls = @("http://127.0.0.1:3000/", "http://localhost:3000/")
          $deadline = (Get-Date).AddSeconds(240)

          while ((Get-Date) -lt $deadline) {
            if (Test-Path ".\juice-shop.pid") {
              $juiceShopProcessId = Get-Content ".\juice-shop.pid" -ErrorAction SilentlyContinue
              if ($juiceShopProcessId -and $null -eq (Get-Process -Id $juiceShopProcessId -ErrorAction SilentlyContinue)) {
                Write-Error "Juice Shop process is no longer running before health check succeeded."
                if (Test-Path ".\juice-shop.log") {
                  Get-Content ".\juice-shop.log" -Tail 50
                }
                if (Test-Path ".\juice-shop-error.log") {
                  Get-Content ".\juice-shop-error.log" -Tail 50
                }
                exit 1
              }
            }

            try {
              foreach ($url in $urls) {
                $response = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 5 -ErrorAction Stop
                if ($response.StatusCode -ge 200 -and $response.StatusCode -lt 400) {
                  Write-Host "Juice Shop is ready at $url"
                  exit 0
                }
              }
            } catch {
            }

            Start-Sleep -Seconds 5
          }

          Write-Error "Juice Shop did not become ready within 240 seconds."
          if (Test-Path ".\juice-shop.log") {
            Get-Content ".\juice-shop.log" -Tail 50
          }
          if (Test-Path ".\juice-shop-error.log") {
            Get-Content ".\juice-shop-error.log" -Tail 50
          }
          exit 1
