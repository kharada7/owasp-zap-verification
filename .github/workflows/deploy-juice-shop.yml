name: Deploy OWASP Juice Shop

on:
  workflow_dispatch:

# セルフホストマシンに OWASP Juice Shop をデプロイするワークフローです。
jobs:
  deploy-juice-shop:
    name: Deploy Juice Shop (self-hosted)
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root dependencies
        run: npm install

      - name: Install Juice Shop dependencies
        working-directory: ./juice-shop
        run: npm install

      - name: Start Juice Shop from repository
        working-directory: ./juice-shop
        shell: powershell
        run: |
          $process = Start-Process -FilePath "npm.cmd" -ArgumentList "start" -WorkingDirectory (Get-Location) -RedirectStandardOutput "..\juice-shop.log" -RedirectStandardError "..\juice-shop-error.log" -PassThru
          Set-Content -Path "..\juice-shop.pid" -Value $process.Id

      - name: Wait for Juice Shop
        shell: powershell
        run: |
          $deadline = (Get-Date).AddSeconds(240)
          while ((Get-Date) -lt $deadline) {
            try {
              $response = Invoke-WebRequest -Uri "http://127.0.0.1:3000/"
              if ($response.StatusCode -eq 200) {
                exit 0
              }
            } catch {
            }

            Start-Sleep -Seconds 5
          }

          Write-Error "Juice Shop did not become ready within 240 seconds."
          if (Test-Path ".\juice-shop.log") {
            Get-Content ".\juice-shop.log" -Tail 50
          }
          if (Test-Path ".\juice-shop-error.log") {
            Get-Content ".\juice-shop-error.log" -Tail 50
          }
          exit 1
