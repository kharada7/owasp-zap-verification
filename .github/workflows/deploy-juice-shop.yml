name: Deploy OWASP Juice Shop

on:
  workflow_dispatch:

# セルフホストマシンに OWASP Juice Shop をデプロイするワークフローです。
jobs:
  deploy-juice-shop:
    name: Deploy Juice Shop (self-hosted)
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Install Juice Shop dependencies
        working-directory: ./juice-shop
        run: npm install

      - name: Start Juice Shop from repository
        working-directory: ./juice-shop
        run: |
          npm start > ../juice-shop.log 2>&1 &
          echo $! > ../juice-shop.pid

      - name: Wait for Juice Shop
        run: |
          timeout 240 bash -c 'until curl -fsS http://127.0.0.1:3000/ >/dev/null; do sleep 5; done'
