name: DAST Scan 2

on:
  workflow_dispatch:

jobs:
  dast:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Install Juice Shop dependencies
        working-directory: ./juice-shop
        run: npm install

      - name: Start Juice Shop from repository
        working-directory: ./juice-shop
        run: |
          npm start > ../juice-shop.log 2>&1 &
          echo $! > ../juice-shop.pid

      - name: Wait for Juice Shop
        run: |
          timeout 240 bash -c 'until curl -fsS http://127.0.0.1:3000/ >/dev/null; do sleep 5; done'

      - name: Start OWASP ZAP
        run: |
          docker run -d \
            --name zap \
            --network=host \
            -u zap \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -daemon \
            -host 0.0.0.0 \
            -port 8080 \
            -config api.disablekey=true \
            -config api.addrs.addr.name=.* \
            -config api.addrs.addr.regex=true

      - name: Check ZAP container started
        run: |
          sleep 10
          echo "=== Container Status ==="
          docker ps | grep zap || (echo "ERROR: ZAP container not found"; docker ps; exit 1)
          echo ""
          echo "=== ZAP Logs (first 100 lines) ==="
          docker logs zap 2>&1 | head -100 || true
          echo ""
          echo "=== Network inspection ==="
          docker inspect zap | grep -A 5 '"Ports"' || true

      - name: Wait for ZAP API
        run: |
          echo "Attempting to connect to ZAP API..."
          for i in {1..60}; do
            echo "Attempt $i/60..."
            
            if response=$(curl -v http://127.0.0.1:8080/JSON/core/view/version/ 2>&1); then
              echo "curl succeeded"
              if echo "$response" | grep -q '"version"'; then
                echo "ZAP API is ready"
                exit 0
              fi
              echo "Response: $response" | head -10
            else
              echo "curl failed with exit code $?"
            fi
            
            sleep 3
          done

          echo "ZAP API did not become ready in time"
          echo ""
          echo "=== Final diagnostics ==="
          docker ps || true
          docker logs zap || true
          curl -v http://127.0.0.1:8080/ 2>&1 || true
          exit 1

      - name: Run Playwright via ZAP proxy
        run: |
          echo "Running Playwright tests..."
          npx playwright test ./tests/juice-shop-01.spec.ts --project=chromium --timeout=120000 --reporter=html --reporter=line
          echo "Playwright tests completed with exit code: $?"
          echo "Checking for playwright-report directory..."
          ls -la playwright-report/ || echo "Warning: playwright-report not found"
          
          echo "Verifying Juice Shop is still running..."
          curl -fsS http://127.0.0.1:3000/ > /dev/null && echo "✓ Juice Shop is accessible" || echo "✗ Juice Shop is not accessible"

      - name: Generate ZAP report with Automation Framework
        run: |
          mkdir -p reports

          docker cp zap/automation.yaml zap:/tmp/automation.yaml
          docker exec zap mkdir -p /zap/reports

          # 起動中の ZAP デーモンの API 経由で自動化プランを実行する。
          # --network=host によりコンテナ内の localhost はホストの localhost と同一。
          echo "Starting ZAP Automation Framework..."
          response=$(curl -s "http://127.0.0.1:8080/JSON/automation/action/runPlan/?filePath=/tmp/automation.yaml")
          echo "API Response: $response"
          planId=$(echo "$response" | grep -o '"planId":"[^"]*"' | cut -d'"' -f4 || echo "")
          echo "Plan ID: $planId"
          
          # API 実行が完了するまでポーリングで確認（最大 10 分）
          # Plan ID が 0 でない場合のみポーリングを実行
          if [ "$planId" != "" ] && [ "$planId" != "0" ]; then
            echo "Waiting for ZAP Automation Framework to complete..."
            for i in {1..60}; do
              sleep 10
              status=$(curl -s "http://127.0.0.1:8080/JSON/automation/view/plan/?id=$planId" || echo "")
              echo "Plan Status Check $i/60: $status"
              
              # プランの実行状態を確認（応答があればOK）
              if [ -n "$status" ]; then
                break
              fi
            done
          else
            echo "Warning: Plan ID is invalid. ZAP may not have started the automation framework properly."
            echo "Attempting to retrieve any generated reports anyway..."
            sleep 30
          fi
          
          echo "Final ZAP Container Logs:"
          docker logs zap | tail -100
          
          # コンテナからレポートをコピー
          echo "Copying reports from ZAP container..."
          docker cp zap:/zap/reports/. reports || echo "Warning: Could not copy reports"
          
          # レポートが実際に生成されたか確認
          echo "Checking generated reports:"
          ls -la reports/ || echo "Warning: reports directory is empty"
          find reports -type f -name "*.html" -o -name "*.json" || echo "Warning: No report files found"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: reports

      - name: Upload runtime logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-logs
          path: |
            juice-shop.log

      - name: Show container logs
        if: always()
        run: |
          docker logs zap || true
          tail -n 200 juice-shop.log || true

      - name: Cleanup
        if: always()
        run: |
          if [ -f juice-shop.pid ]; then
            kill "$(cat juice-shop.pid)" || true
          fi
          docker rm -f zap || true