name: DAST Scan 2

on:
  workflow_dispatch:

jobs:
  dast:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Install Juice Shop dependencies
        working-directory: ./juice-shop
        run: npm install

      - name: Start Juice Shop from repository
        working-directory: ./juice-shop
        run: |
          npm start > ../juice-shop.log 2>&1 &
          echo $! > ../juice-shop.pid

      - name: Wait for Juice Shop
        run: |
          timeout 240 bash -c 'until curl -fsS http://127.0.0.1:3000/ >/dev/null; do sleep 5; done'

      - name: Start OWASP ZAP
        run: |
          docker run -d \
            --name zap \
            --add-host=host.docker.internal:host-gateway \
            -u zap \
            -p 8080:8080 \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.disablekey=true

      - name: Wait for ZAP API
        run: |
          for i in {1..60}; do
            if curl -sS http://127.0.0.1:8080/JSON/core/view/version/ | grep -q '"version"'; then
              echo "ZAP API is ready"
              exit 0
            fi

            echo "Waiting for ZAP API... ($i/60)"
            sleep 3
          done

          echo "ZAP API did not become ready in time"
          docker logs zap || true
          exit 1

      - name: Run Playwright via ZAP proxy
        run: npx playwright test ./tests/juice-shop.spec.ts --project=chromium

      - name: Generate ZAP report with Automation Framework
        run: |
          mkdir -p reports

          docker cp zap/automation.yaml zap:/tmp/automation.yaml
          docker exec zap mkdir -p /zap/reports
          docker exec zap zap.sh -cmd -autorun /tmp/automation.yaml

          docker cp zap:/zap/reports/. reports

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: reports

      - name: Upload runtime logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-logs
          path: |
            juice-shop.log

      - name: Show container logs
        if: always()
        run: |
          docker logs zap || true
          tail -n 200 juice-shop.log || true

      - name: Cleanup
        if: always()
        run: |
          if [ -f juice-shop.pid ]; then
            kill "$(cat juice-shop.pid)" || true
          fi
          docker rm -f zap || true
